<div (mousemove)="parallax.onMouseMove($event)"
    class="min-h-screen bg-gray-950 text-white flex items-center justify-center px-4 py-10 relative overflow-hidden z-10 parallax">
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">

        <!-- Orb 1 — grande verde esmeralda (topo esquerda) -->
        <div class="orb-1 absolute w-[600px] h-[600px] bg-emerald-500/25 blur-[80px] rounded-full"
            [style.transform]="'translateY(var(--f1-y, 0px)) translateX(var(--f1-x, 0px)) ' + parallax.getTransform(20, 30)"
            style="top: -100px; left: 15%;">
        </div>

        <!-- Orb 2 — azul (canto inferior direito) -->
        <div class="orb-2 absolute w-[500px] h-[500px] bg-blue-500/15 blur-[80px] rounded-full"
            [style.transform]="parallax.getTransform(-30, 20)" style="bottom: -100px; right: 5%;">
        </div>

        <!-- Orb 3 — esmeralda médio (centro-direita) -->
        <div class="orb-3 absolute w-[320px] h-[320px] bg-emerald-400/20 blur-[60px] rounded-full"
            [style.transform]="parallax.getTransform(15, -25)" style="top: 38%; left: 58%;">
        </div>

        <!-- Orb 4 — ciano sutil (centro-esquerda) -->
        <div class="orb-4 absolute w-[250px] h-[250px] bg-cyan-400/12 blur-[50px] rounded-full"
            [style.transform]="parallax.getTransform(10, 10)" style="top: 55%; left: 10%;">
        </div>

        <!-- Orb 5 — verde lima pequeno (topo direita) -->
        <div class="orb-5 absolute w-[180px] h-[180px] bg-green-300/15 blur-[40px] rounded-full"
            [style.transform]="parallax.getTransform(-10, 15)" style="top: 12%; right: 18%;">
        </div>

        <!-- Partículas flutuantes -->
        <div class="particle absolute w-1.5 h-1.5 bg-emerald-400/50 rounded-full"
            style="bottom: 20%; left: 25%; animation-duration: 8s; animation-delay: 0s;"></div>
        <div class="particle absolute w-1 h-1 bg-emerald-300/40 rounded-full"
            style="bottom: 35%; left: 42%; animation-duration: 11s; animation-delay: 2s;"></div>
        <div class="particle absolute w-2 h-2 bg-cyan-400/30 rounded-full"
            style="bottom: 15%; left: 68%; animation-duration: 9s; animation-delay: 4s;"></div>
        <div class="particle absolute w-1 h-1 bg-green-300/50 rounded-full"
            style="bottom: 50%; left: 80%; animation-duration: 13s; animation-delay: 1s;"></div>
        <div class="particle absolute w-1.5 h-1.5 bg-emerald-500/40 rounded-full"
            style="bottom: 10%; left: 55%; animation-duration: 7s; animation-delay: 5s;"></div>
        <div class="particle absolute w-1 h-1 bg-blue-400/30 rounded-full"
            style="bottom: 40%; left: 15%; animation-duration: 10s; animation-delay: 3s;"></div>

    </div>

    <div class="w-full max-w-md">

        <!-- Card -->
        <div
            class="relative bg-white/[0.04] border border-white/10 rounded-3xl px-9 pt-10 pb-9 backdrop-blur-2xl shadow-[0_40px_80px_rgba(0,0,0,0.5),inset_0_0_0_1px_rgba(255,255,255,0.04)] overflow-hidden">

            <!-- top glow line -->
            <div
                class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-emerald-400/40 to-transparent">
            </div>

            <!-- Logo -->
            <div (click)="goToHome()" class="group flex items-center gap-2 mb-7 cursor-pointer">
                <div
                    class="w-8 h-8 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-xl flex items-center justify-center shadow-[0_0_12px_rgba(52,211,153,0.35)] transition-all duration-300 group-hover:shadow-[0_0_18px_rgba(52,211,153,0.5)]">
                    <svg viewBox="0 0 64 64" class="w-6 h-6" style="fill: rgba(2,44,34,.85)">
                        <path
                            d="M32 8C18 8 10 20 10 32c0 8 4 15 10 20 1-6 3-11 7-15-2 5-2 10 0 15 4 2 8 3 12 3 14 0 22-10 22-23C61 18 48 8 32 8z" />
                        <path d="M32 42 Q32 55 28 60" stroke="rgba(2,44,34,.5)" stroke-width="2.5"
                            stroke-linecap="round" fill="none" />
                    </svg>
                </div>

                <span
                    class="text-xl font-extrabold tracking-tight select-none transition-all duration-300 group-hover:tracking-wide group-hover:text-white">
                    Habit
                    <span
                        class="text-emerald-400 transition-all duration-300 group-hover:text-emerald-300 group-hover:drop-shadow-[0_0_6px_rgba(52,211,153,0.6)]">
                        Flow
                    </span>
                </span>

            </div>

            <!-- Heading -->
            <h2 class="text-2xl font-bold tracking-tight leading-snug mb-1">Crie sua conta</h2>
            <p class="text-sm text-gray-400 font-light mb-7">Comece a transformar seus hábitos hoje</p>

            <!-- Google -->
            <button
                class="w-full flex items-center justify-center gap-3 bg-white/5 hover:bg-white/[0.08] border border-white/10 hover:border-white/20 rounded-xl px-4 py-3 text-sm font-medium transition-all duration-200 hover:-translate-y-px active:translate-y-0 cursor-pointer">
                <svg class="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Registrar com Google
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-5 text-xs text-gray-500">
                <span class="flex-1 h-px bg-white/[0.08]"></span>
                ou preencha o formulário
                <span class="flex-1 h-px bg-white/[0.08]"></span>
            </div>

            <!-- Nome + Sobrenome -->
            <div class="mb-4">
                <div>
                    <label
                        class="block text-[11px] font-medium text-gray-400 uppercase tracking-widest mb-2">Nome</label>
                    <div class="relative">
                        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none w-4 h-4"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" placeholder="Seu nome" [(ngModel)]="nome"
                            class="w-full bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-gray-500 pl-10 pr-3 py-3 outline-none transition-all duration-200 focus:border-emerald-500/50 focus:bg-emerald-500/[0.04] focus:ring-[3px] focus:ring-emerald-500/[0.10]" />
                    </div>
                </div>
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-widest mb-2">E-mail</label>
                <div class="relative">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none w-4 h-4"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg>
                    <input type="email" placeholder="voce@exemplo.com" [(ngModel)]="email"
                        class="w-full bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-gray-500 pl-10 pr-4 py-3 outline-none transition-all duration-200 focus:border-emerald-500/50 focus:bg-emerald-500/[0.04] focus:ring-[3px] focus:ring-emerald-500/[0.10]" />
                </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-widest mb-2">Senha</label>
                <div class="relative">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none w-4 h-4"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input type="password" placeholder="Mínimo 8 caracteres" [(ngModel)]="senha"
                        (input)="checkStrength()"
                        class="w-full bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-gray-500 pl-10 pr-4 py-3 outline-none transition-all duration-200 focus:border-emerald-500/50 focus:bg-emerald-500/[0.04] focus:ring-[3px] focus:ring-emerald-500/[0.10]" />
                </div>
                <!-- Strength bar -->
                <div class="flex gap-1 mt-2 h-[3px]">
                    <span class="flex-1 rounded-full transition-all duration-300"
                        [style.background]="strengthColors[0]"></span>
                    <span class="flex-1 rounded-full transition-all duration-300"
                        [style.background]="strengthColors[1]"></span>
                    <span class="flex-1 rounded-full transition-all duration-300"
                        [style.background]="strengthColors[2]"></span>
                    <span class="flex-1 rounded-full transition-all duration-300"
                        [style.background]="strengthColors[3]"></span>
                </div>
                <p class="text-[11px] mt-1 transition-colors duration-300" [style.color]="strengthLabelColor">{{
                    strengthLabel }}</p>
            </div>

            <!-- Confirm password -->
            <div class="mb-4">
                <label class="block text-[11px] font-medium text-gray-400 uppercase tracking-widest mb-2">Confirmar
                    senha</label>
                <div class="relative">
                    <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none w-4 h-4"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <input type="password" placeholder="••••••••" [(ngModel)]="confirmPassword"
                        class="w-full bg-white/5 border border-white/10 rounded-xl text-sm text-white placeholder-gray-500 pl-10 pr-4 py-3 outline-none transition-all duration-200 focus:border-emerald-500/50 focus:bg-emerald-500/[0.04] focus:ring-[3px] focus:ring-emerald-500/[0.10]" />
                </div>
            </div>

            <!-- Terms -->
            <label class="flex items-start gap-3 cursor-pointer mb-1">
                <input type="checkbox" [(ngModel)]="acceptedTerms"
                    class="mt-0.5 w-4 h-4 accent-emerald-400 shrink-0 cursor-pointer" />
                <span class="text-[13px] text-gray-400 leading-snug">
                    Aceito os
                    <span class="text-gray-300 hover:text-emerald-400 transition-colors cursor-pointer">Termos de
                        Uso</span>
                    e a
                    <span class="text-gray-300 hover:text-emerald-400 transition-colors cursor-pointer">Política de
                        Privacidade</span>
                </span>
            </label>

            <!-- Submit -->
            <button (click)="onRegister()"
                class="relative w-full mt-5 bg-gradient-to-br from-emerald-400 to-emerald-600 text-emerald-950 font-bold text-[15px] py-3.5 rounded-xl shadow-[0_4px_24px_rgba(52,211,153,0.28)] hover:shadow-[0_8px_32px_rgba(52,211,153,0.38)] hover:-translate-y-px active:translate-y-0 transition-all duration-200 overflow-hidden group cursor-pointer">
                <span
                    class="absolute inset-0 bg-gradient-to-br from-white/15 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none"></span>
                Criar conta
            </button>

            <!-- Footer -->
            <p class="text-center mt-5 text-sm text-gray-400">
                Já tem conta?
                <button (click)="goToLogin()"
                    class="text-emerald-400 font-medium hover:underline hover:opacity-80 transition-opacity ml-1 cursor-pointer">
                    Entrar
                </button>
            </p>

        </div>
    </div>
</div>
