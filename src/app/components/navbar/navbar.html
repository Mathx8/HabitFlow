<div class="flex h-screen bg-gray-950 text-white overflow-hidden relative">

    <!-- Orbs de fundo -->
    <div class="absolute w-[420px] h-[420px] rounded-full pointer-events-none orb-1"
        style="background:radial-gradient(circle,rgba(52,211,153,.22) 0%,transparent 70%);filter:blur(70px);top:-120px;left:-60px">
    </div>
    <div class="absolute w-[300px] h-[300px] rounded-full pointer-events-none orb-2"
        style="background:radial-gradient(circle,rgba(59,130,246,.14) 0%,transparent 70%);filter:blur(60px);bottom:-80px;left:280px">
    </div>
    <div class="absolute w-[180px] h-[180px] rounded-full pointer-events-none orb-pulse"
        style="background:radial-gradient(circle,rgba(52,211,153,.18) 0%,transparent 70%);filter:blur(40px);top:50%;left:280px">
    </div>

    <!-- SIDEBAR -->
    <!-- SIDEBAR COMPACTA -->
    <aside class="fixed top-0 left-0 h-screen w-[72px] z-20
           flex flex-col items-center py-4
           bg-white/[0.02] border-r border-white/[0.06] backdrop-blur-xl">

        <!-- Top spacing -->
        <div class="h-2"></div>

        <!-- NAV -->
        <nav class="flex flex-col items-center gap-2 mt-2">

            <!-- ITEM -->
            <button routerLink="/dashboard" routerLinkActive="active-nav" class="group relative w-11 h-11 flex items-center justify-center rounded-xl
                   text-white/50 hover:text-white hover:bg-white/[0.06] transition cursor-pointer">

                <div class="w-5 h-5" [innerHTML]="icons.dashboard"></div>

                <!-- Tooltip -->
                <span class="absolute left-full ml-3 px-2 py-1 text-xs rounded-md
                       bg-gray-900 text-white opacity-0 group-hover:opacity-100
                       transition whitespace-nowrap pointer-events-none">
                    Dashboard
                </span>
            </button>

            <button routerLink="/habitos" routerLinkActive="active-nav" class="group relative w-11 h-11 flex items-center justify-center rounded-xl
                   text-white/50 hover:text-white hover:bg-white/[0.06] transition cursor-pointer">

                <div class="w-5 h-5" [innerHTML]="icons.habitos"></div>

                <!-- Badge -->
                <span class="absolute -top-1 -right-1 text-[9px] px-1 rounded bg-emerald-400 text-black">
                    12
                </span>

                <span class="absolute left-full ml-3 px-2 py-1 text-xs rounded-md
                         bg-gray-900 text-white opacity-0 group-hover:opacity-100 transition whitespace-nowrap">
                    Hábitos
                </span>
            </button>

            <button routerLink="/conquistas" routerLinkActive="active-nav" class="group relative w-11 h-11 flex items-center justify-center rounded-xl
                   text-white/50 hover:text-white hover:bg-white/[0.06] transition cursor-pointer">

                <div class="w-5 h-5" [innerHTML]="icons.settings"></div>

                <span class="absolute left-full ml-3 px-2 py-1 text-xs rounded-md
                         bg-gray-900 text-white opacity-0 group-hover:opacity-100 transition whitespace-nowrap">
                    Conquistas
                </span>
            </button>

            <button routerLink="/analytics" routerLinkActive="active-nav" class="group relative w-11 h-11 flex items-center justify-center rounded-xl
                   text-white/50 hover:text-white hover:bg-white/[0.06] transition cursor-pointer">

                <div class="w-5 h-5" [innerHTML]="icons.chat"></div>

                <span class="absolute left-full ml-3 px-2 py-1 text-xs rounded-md
                         bg-gray-900 text-white opacity-0 group-hover:opacity-100 transition whitespace-nowrap">
                    Chat
                </span>
            </button>

        </nav>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- USER -->
        <div class="flex flex-col items-center gap-3 mb-2 relative">

            <!-- Avatar com dropdown -->
            <div class="relative">
                <button (click)="toggleMenu()" class="w-10 h-10 rounded-xl flex items-center justify-center text-sm font-bold
                   text-emerald-400 border border-emerald-400/20 transition-all duration-200
                   hover:border-emerald-400/50 hover:shadow-[0_0_12px_rgba(52,211,153,0.2)] cursor-pointer"
                    style="background:linear-gradient(135deg,rgba(52,211,153,.12),rgba(5,150,105,.2));font-family:'Syne',sans-serif">
                    {{ inicial }}
                </button>

                <!-- Dropdown -->
                <div *ngIf="menuOpen" class="absolute bottom-full left-full ml-3 mb-0 w-44
                   bg-gray-900 border border-white/10 rounded-2xl shadow-[0_16px_40px_rgba(0,0,0,0.5)]
                   overflow-hidden z-50">

                    <!-- Info do usuário -->
                    <div class="px-4 py-3 border-b border-white/[0.07]">
                        <p class="text-xs font-semibold text-white/80 truncate">{{ usuario?.nome }}</p>
                        <p class="text-[11px] text-white/35 truncate mt-0.5">{{ usuario?.email }}</p>
                    </div>

                    <!-- Opções -->
                    <div class="p-1.5 flex flex-col gap-0.5">

                        <button routerLink="/perfil" (click)="menuOpen = false" class="flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm text-white/60
                           hover:bg-white/[0.07] hover:text-white/90 transition-all duration-150 w-full text-left cursor-pointer">
                            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            Perfil
                        </button>

                        <button (click)="logout()" class="flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm text-red-400/60
                           hover:bg-red-500/[0.08] hover:text-red-400 transition-all duration-150 w-full text-left cursor-pointer">
                            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                <polyline points="16 17 21 12 16 7" />
                                <line x1="21" y1="12" x2="9" y2="12" />
                            </svg>
                            Sair da conta
                        </button>

                    </div>
                </div>
            </div>
        </div>
    </aside>

</div>
