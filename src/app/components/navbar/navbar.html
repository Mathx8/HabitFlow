<div class="flex h-screen bg-gray-950 text-white overflow-hidden relative">

    <!-- Orbs de fundo -->
    <div class="absolute w-[420px] h-[420px] rounded-full pointer-events-none orb-1"
        style="background:radial-gradient(circle,rgba(52,211,153,.22) 0%,transparent 70%);filter:blur(70px);top:-120px;left:-60px">
    </div>
    <div class="absolute w-[300px] h-[300px] rounded-full pointer-events-none orb-2"
        style="background:radial-gradient(circle,rgba(59,130,246,.14) 0%,transparent 70%);filter:blur(60px);bottom:-80px;left:280px">
    </div>
    <div class="absolute w-[180px] h-[180px] rounded-full pointer-events-none orb-pulse"
        style="background:radial-gradient(circle,rgba(52,211,153,.18) 0%,transparent 70%);filter:blur(40px);top:50%;left:280px">
    </div>

    <!-- SIDEBAR -->
    <!-- SIDEBAR COMPACTA -->
    <aside class="fixed top-0 left-0 h-screen w-[72px] z-20
    flex flex-col items-center justify-between
    bg-white/[0.02] border-r border-white/[0.06] backdrop-blur-xl">

        <!-- TOPO (logo) -->
        <div routerLink="/dashboard" routerLinkActive="active-dashboard" [routerLinkActiveOptions]="{ exact: true }"
            class="flex flex-col items-center pt-8 pb-6 translate-y-[2px] cursor-pointer">
            <div class="w-9 h-9 rounded-[11px] flex-shrink-0 flex items-center justify-center relative overflow-hidden shadow-[0_0_20px_rgba(52,211,153,.35)]"
                style="background:linear-gradient(135deg,#34d399,#059669)">
                <div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent pointer-events-none"></div>
                <div class="w-5 h-5 relative z-10" [innerHTML]="icons.logo"></div>
            </div>

        </div>

        <!-- NAV CENTRAL -->
        <nav class="flex flex-col items-center gap-5 mt-4">

            <button routerLink="/habitos" routerLinkActive="active-nav" class="group relative w-12 h-12 flex items-center justify-center rounded-xl
            text-white/60 hover:text-white transition cursor-pointer">

                <div class="w-6 h-6" [innerHTML]="icons.habitos"></div>

                <span class="pointer-events-none absolute left-full ml-3 px-2 py-1 text-xs rounded-md
                bg-gray-900 text-white opacity-0 group-hover:opacity-100 transition">
                    Hábitos
                </span>
            </button>

            <button routerLink="/conquistas" routerLinkActive="active-nav" class="group relative w-12 h-12 flex items-center justify-center rounded-xl
            text-white/60 hover:text-white transition cursor-pointer">

                <div class="w-6 h-6" [innerHTML]="icons.settings"></div>

                <span class="pointer-events-none absolute left-full ml-3 px-2 py-1 text-xs rounded-md
                bg-gray-900 text-white opacity-0 group-hover:opacity-100 transition">
                    Conquistas
                </span>
            </button>

            <button routerLink="/chat" routerLinkActive="active-nav" class="group relative w-12 h-12 flex items-center justify-center rounded-xl
            text-white/60 hover:text-white transition cursor-pointer">

                <div class="w-6 h-6" [innerHTML]="icons.chat"></div>

                <span class="pointer-events-none absolute left-full ml-3 px-2 py-1 text-xs rounded-md
                bg-gray-900 text-white opacity-0 group-hover:opacity-100 transition">
                    Chat
                </span>
            </button>

        </nav>

        <!-- EMPURRA PRA BAIXO -->
        <div class="flex-1"></div>

        <!-- BOTTOM (perfil igual Instagram) -->
        <div class="relative flex flex-col items-center gap-4 pb-6">

            <!-- Avatar -->
            <button (click)="toggleMenu()" class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold
        text-emerald-400 border border-emerald-400/20
        hover:border-emerald-400/50 transition-all duration-200
        hover:scale-105 active:scale-95 cursor-pointer">

                {{ inicial }}
            </button>

            <!-- Dropdown -->
            <div *ngIf="menuOpen" class="absolute bottom-14 left-full ml-3 w-56 bg-white/[0.03] backdrop-blur-2xl border border-white/[0.08] 
                rounded-2xl shadow-[0_20px_60px_rgba(0,0,0,0.6)] overflow-hidden z-50 animate-dropdown">

                <!-- Glow topo -->
                <div class="absolute inset-0 bg-gradient-to-b from-white/[0.06] to-transparent pointer-events-none">
                </div>

                <!-- USER INFO -->
                <div class="relative px-4 py-3 border-b border-white/[0.06]">

                    <p class="text-sm font-semibold text-white/90 truncate">
                        {{ usuario?.username }}
                    </p>

                    <p class="text-[11px] text-white/40 truncate mt-0.5">
                        {{ usuario?.email }}
                    </p>

                </div>

                <!-- ACTIONS -->
                <div class="relative p-1.5 flex flex-col gap-1">

                    <button routerLink="/perfil" (click)="menuOpen = false" class="group flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm
                text-white/60 hover:text-white
                hover:bg-white/[0.06] transition-all duration-200 w-full text-left cursor-pointer">

                        <svg class="w-4 h-4 opacity-70 group-hover:opacity-100 transition" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>

                        Perfil
                    </button>

                    <div class="h-px bg-white/[0.06] my-1"></div>

                    <button (click)="logout()" class="group flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm
                text-red-400/70 hover:text-red-400
                hover:bg-red-500/[0.08] transition-all duration-200 w-full text-left cursor-pointer">

                        <svg class="w-4 h-4 opacity-70 group-hover:opacity-100 transition" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>

                        Sair da conta
                    </button>

                </div>
            </div>
        </div>
    </aside>

</div>
