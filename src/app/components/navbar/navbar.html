<div class="flex h-screen bg-gray-950 text-white overflow-hidden relative">

    <!-- Orbs de fundo -->
    <div class="absolute w-[420px] h-[420px] rounded-full pointer-events-none orb-1"
        style="background:radial-gradient(circle,rgba(52,211,153,.22) 0%,transparent 70%);filter:blur(70px);top:-120px;left:-60px">
    </div>
    <div class="absolute w-[300px] h-[300px] rounded-full pointer-events-none orb-2"
        style="background:radial-gradient(circle,rgba(59,130,246,.14) 0%,transparent 70%);filter:blur(60px);bottom:-80px;left:280px">
    </div>
    <div class="absolute w-[180px] h-[180px] rounded-full pointer-events-none orb-pulse"
        style="background:radial-gradient(circle,rgba(52,211,153,.18) 0%,transparent 70%);filter:blur(40px);top:50%;left:280px">
    </div>

    <!-- SIDEBAR -->
    <aside
        class="relative z-10 w-[240px] flex-shrink-0 flex flex-col p-4 bg-white/[0.03] border-r border-white/[0.08] backdrop-blur-2xl">

        <!-- top glow line -->
        <div
            class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-emerald-400/30 to-transparent">
        </div>

        <!-- Logo -->
        <div class="flex items-center gap-2.5 mb-8 px-1 cursor-pointer group">
            <div class="w-9 h-9 rounded-[11px] flex-shrink-0 flex items-center justify-center relative overflow-hidden shadow-[0_0_20px_rgba(52,211,153,.35)]"
                style="background:linear-gradient(135deg,#34d399,#059669)">
                <div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent pointer-events-none"></div>
                <svg class="w-5 h-5 relative z-10" style="fill:rgba(2,44,34,.85)" viewBox="0 0 64 64">
                    <path
                        d="M32 8C18 8 10 20 10 32c0 8 4 15 10 20 1-6 3-11 7-15-2 5-2 10 0 15 4 2 8 3 12 3 14 0 22-10 22-23C61 18 48 8 32 8z" />
                    <path d="M32 42 Q32 55 28 60" stroke="rgba(2,44,34,.5)" stroke-width="2.5" stroke-linecap="round"
                        fill="none" />
                </svg>
            </div>
            <span class="text-[19px] font-extrabold tracking-tight" style="font-family:'Syne',sans-serif">
                Habit<span class="text-emerald-400 group-hover:text-emerald-300 transition-colors">Flow</span>
            </span>
        </div>

        <!-- Nav label -->
        <p class="text-[10px] font-medium uppercase tracking-[.12em] text-white/25 px-3 mb-1.5">Menu</p>

        <!-- Nav -->
        <nav class="flex flex-col gap-0.5">

            <button routerLink="/dashboard" routerLinkActive="active-nav"
                class="nav-item group flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13.5px] text-white/50 hover:bg-white/[0.06] hover:text-white/85 transition-all duration-200 w-full text-left relative">
                <div
                    class="w-8 h-8 rounded-[9px] flex items-center justify-center bg-white/5 group-hover:bg-white/[0.08] transition-colors flex-shrink-0">
                    <svg class="w-[15px] h-[15px]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>
                </div>
                Dashboard
            </button>

            <button routerLink="/habitos" routerLinkActive="active-nav"
                class="nav-item group flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13.5px] text-white/50 hover:bg-white/[0.06] hover:text-white/85 transition-all duration-200 w-full text-left relative">
                <div
                    class="w-8 h-8 rounded-[9px] flex items-center justify-center bg-white/5 group-hover:bg-white/[0.08] transition-colors flex-shrink-0">
                    <svg class="w-[15px] h-[15px]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4" />
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                    </svg>
                </div>
                Hábitos
                <span
                    class="ml-auto text-[10px] font-semibold px-1.5 py-0.5 rounded-full bg-emerald-400/15 text-emerald-400">12</span>
            </button>

            <button routerLink="/analytics" routerLinkActive="active-nav"
                class="nav-item group flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13.5px] text-white/50 hover:bg-white/[0.06] hover:text-white/85 transition-all duration-200 w-full text-left relative">
                <div
                    class="w-8 h-8 rounded-[9px] flex items-center justify-center bg-white/5 group-hover:bg-white/[0.08] transition-colors flex-shrink-0">
                    <svg class="w-[15px] h-[15px]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                </div>
                Progresso
            </button>

            <button routerLink="/settings" routerLinkActive="active-nav"
                class="nav-item group flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13.5px] text-white/50 hover:bg-white/[0.06] hover:text-white/85 transition-all duration-200 w-full text-left relative">
                <div
                    class="w-8 h-8 rounded-[9px] flex items-center justify-center bg-white/5 group-hover:bg-white/[0.08] transition-colors flex-shrink-0">
                    <svg class="w-[15px] h-[15px]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
                    </svg>
                </div>
                Configurações
            </button>

        </nav>

        <!-- Divider -->
        <div class="h-px bg-white/[0.07] my-3"></div>

        <!-- Footer -->
        <div class="mt-auto flex flex-col gap-1.5">

            <!-- User card -->
            <div
                class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-white/[0.04] border border-white/[0.07] hover:bg-white/[0.07] hover:border-white/[0.12] cursor-pointer transition-all duration-200">
                <div class="w-8 h-8 rounded-[10px] flex-shrink-0 flex items-center justify-center text-xs font-semibold text-emerald-400 border border-emerald-400/25"
                    style="background:linear-gradient(135deg,rgba(52,211,153,.15),rgba(5,150,105,.25));font-family:'Syne',sans-serif">
                    MS
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-[12.5px] font-medium text-white/85 truncate">Matheus</p>
                    <p class="text-[11px] text-white/30">Plano gratuito</p>
                </div>
                <svg class="w-3.5 h-3.5 text-white/25 flex-shrink-0" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </div>

            <!-- Logout -->
            <button (click)="logout()"
                class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-[13px] text-red-400/60 hover:bg-red-500/[0.08] hover:text-red-400/90 transition-all duration-200 w-full">
                <svg class="w-[15px] h-[15px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Sair da conta
            </button>

        </div>
    </aside>

</div>
