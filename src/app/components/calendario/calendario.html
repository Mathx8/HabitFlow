<div
    class="flex flex-col gap-5 bg-gradient-to-b from-white/[0.04] to-white/[0.01] ring-1 ring-white/10 rounded-3xl p-5 md:p-6 transition-all duration-300 hover:ring-white/20 h-full">

    <div class="flex items-start justify-between">
        <div class="flex flex-col gap-1">
            <h4 class="text-base font-bold text-zinc-100 flex items-center gap-2.5 tracking-tight">
                {{ habitoNome }}

                <span *ngIf="!isLoading" class="flex h-2.5 w-2.5 relative" title="Hábito ativo">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </span>
            </h4>

            <span *ngIf="!isLoading" class="text-sm font-medium text-zinc-400">
                <strong class="text-emerald-400">{{ totalConcluidos }}</strong> dias concluídos
            </span>
        </div>

        <div *ngIf="isLoading" class="p-1">
            <svg class="animate-spin w-5 h-5 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity="0.25" fill="none" />
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"
                    stroke="currentColor" />
            </svg>
        </div>
    </div>

    <div class="w-full mt-2" *ngIf="!isLoading">
        <div class="grid grid-cols-7 gap-1.5 sm:gap-2">

            <div *ngFor="let d of DIAS_SEMANA"
                class="text-[10px] font-bold text-zinc-500 text-center uppercase tracking-widest mb-2">
                {{ d }}
            </div>

            <ng-container *ngFor="let semana of semanas">
                <ng-container *ngFor="let dia of semana.dias">

                    <div class="group/item relative aspect-square rounded-lg sm:rounded-xl flex items-center justify-center text-xs font-semibold transition-all duration-300"
                        [ngClass]="{
                            'bg-transparent': !dia,
                            'bg-white/[0.03] text-zinc-500 ring-1 ring-white/[0.05] hover:ring-white/20 hover:bg-white/[0.08] cursor-default': dia && !dia.concluido,
                            'bg-gradient-to-br from-emerald-400 to-emerald-600 text-zinc-900 shadow-[0_0_12px_rgba(52,211,153,0.3)] hover:scale-105 hover:shadow-[0_0_16px_rgba(52,211,153,0.5)] z-10 cursor-default': dia?.concluido
                        }">

                        {{ dia ? (dia.data | date:'d') : '' }}

                        <div *ngIf="dia"
                            class="absolute bottom-full mb-2 opacity-0 group-hover/item:opacity-100 transition-opacity duration-200 pointer-events-none z-50 flex flex-col items-center">
                            <div
                                class="bg-zinc-800 text-zinc-100 text-[10px] font-medium px-3 py-1.5 rounded-lg whitespace-nowrap shadow-xl ring-1 ring-white/10 flex items-center gap-1.5">
                                <span [class]="dia.concluido ? 'text-emerald-400' : 'text-zinc-400'">
                                    {{ dia.concluido ? '🔥' : '⏳' }}
                                </span>
                                <span>{{ dia.data | date:'dd/MM' }}</span>
                            </div>
                            <div class="w-2 h-2 bg-zinc-800 rotate-45 -mt-1 ring-1 ring-white/10"
                                style="border-top: none; border-left: none;"></div>
                        </div>

                    </div>

                </ng-container>
            </ng-container>

        </div>
    </div>

    <div *ngIf="!isLoading && semanas.length === 0"
        class="flex flex-col items-center justify-center py-6 px-4 text-center">
        <div
            class="w-10 h-10 mb-3 rounded-full bg-white/[0.05] flex items-center justify-center text-zinc-500 ring-1 ring-white/10">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        </div>
        <p class="text-zinc-400 text-xs font-medium">Histórico vazio no momento.</p>
    </div>

</div>
