<div class="flex flex-col gap-3">

    <!-- Header -->
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-white/70">{{ habitoNome }}</p>
            <span *ngIf="!isLoading"
                class="text-xs font-medium px-2 py-0.5 rounded-full bg-emerald-400/15 text-emerald-400">
                {{ totalConcluidos }} registros
            </span>
        </div>
        <div *ngIf="isLoading">
            <svg class="animate-spin w-4 h-4 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4" />
            </svg>
        </div>
    </div>

    <!-- Grade -->
    <div class="relative overflow-x-auto">

        <!-- Labels de mês -->
        <div class="flex mb-1 ml-6">
            <div *ngFor="let _ of semanas; let i = index" class="w-3 flex-shrink-0 mr-0.5 relative">

                <ng-container *ngFor="let m of mesesVisiveis">
                    <span *ngIf="m.colIndex === i" class="absolute text-[9px] text-white/30 whitespace-nowrap"
                        [style.left.px]="(m.colIndex - i) * 13">
                        {{ m.label }}
                    </span>
                </ng-container>

            </div>
        </div>

        <!-- Grade principal -->
        <div class="flex gap-0.5 items-start">

            <!-- Labels dos dias da semana -->
            <div class="flex flex-col gap-0.5 mr-1 flex-shrink-0">
                <div *ngFor="let d of DIAS_SEMANA; let i = index" class="h-3 w-4 flex items-center justify-end">
                    <span *ngIf="i % 2 === 1" class="text-[9px] text-white/25 leading-none">{{ d }}</span>
                </div>
            </div>

            <!-- Colunas (semanas) -->
            <div *ngFor="let semana of semanas" class="flex flex-col gap-0.5 flex-shrink-0">
                <div *ngFor="let dia of semana.dias"
                    class="w-3 h-3 rounded-[2px] cursor-pointer transition-all duration-150 hover:ring-1 hover:ring-white/30 hover:scale-110"
                    [style.background]="getCor(dia)" [style.opacity]="getOpacity(dia)"
                    (mouseenter)="showTooltip($event, dia)" (mouseleave)="hideTooltip()">
                </div>
            </div>
        </div>

        <!-- Tooltip -->
        <div *ngIf="tooltip"
            class="absolute z-10 pointer-events-none bg-gray-800 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-white/80 whitespace-nowrap shadow-xl"
            [style.left.px]="tooltip.x + 12" [style.top.px]="tooltip.y - 10">
            {{ tooltip.texto }}
        </div>

    </div>

    <!-- Legenda -->
    <div class="flex items-center gap-1.5 ml-6">
        <span class="text-[10px] text-white/25">Menos</span>
        <div class="w-3 h-3 rounded-[2px]" style="background:rgba(255,255,255,0.06)"></div>
        <div class="w-3 h-3 rounded-[2px]" style="background:#34d399;opacity:.35"></div>
        <div class="w-3 h-3 rounded-[2px]" style="background:#34d399;opacity:.55"></div>
        <div class="w-3 h-3 rounded-[2px]" style="background:#34d399;opacity:.75"></div>
        <div class="w-3 h-3 rounded-[2px]" style="background:#34d399;opacity:1"></div>
        <span class="text-[10px] text-white/25">Mais</span>
    </div>

</div>
