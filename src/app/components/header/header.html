<header class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8">

    <!-- Título dinâmico -->
    <div class="flex flex-col leading-tight">
        <h1 class="text-emerald-400 text-2xl font-bold tracking-tight">
            {{ pageTitle }}
        </h1>

        <p class="text-zinc-400 text-sm">
            {{ pageSubtitle }}
        </p>
    </div>

    <!-- Ações -->
    <div class="flex items-center gap-3">

        <!-- Data -->
        <div
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/[0.03] ring-1 ring-white/10 text-sm text-zinc-300 capitalize shadow-inner">
            <svg class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            {{ today }}
        </div>

        <!-- Notificações -->
        <app-notificacao-modal></app-notificacao-modal>

    </div>
</header>
